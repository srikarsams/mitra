<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-white/80 dark:bg-gray-950/80 backdrop-blur-md fixed top-0 w-full z-50 border-b border-gray-200/60 dark:border-gray-800/60 flex justify-between items-center px-6 h-16">
<div class="flex items-center gap-4">
<span class="text-lg font-bold text-gray-900 dark:text-gray-50 tracking-tight">Mitra</span>
</div>
<div class="flex items-center gap-6">
<div class="hidden md:flex gap-8">
<span class="text-gray-500 dark:text-gray-400 font-inter tracking-tight headline-sm font-semibold hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors cursor-pointer px-2 py-1 rounded">Portfolio</span>
<span class="text-gray-500 dark:text-gray-400 font-inter tracking-tight headline-sm font-semibold hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors cursor-pointer px-2 py-1 rounded">Insights</span>
<span class="text-gray-900 dark:text-white font-semibold font-inter tracking-tight headline-sm hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors cursor-pointer px-2 py-1 rounded">Import</span>
<span class="text-gray-500 dark:text-gray-400 font-inter tracking-tight headline-sm font-semibold hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors cursor-pointer px-2 py-1 rounded">Settings</span>
</div>
<div class="flex items-center gap-3">
<button class="p-2 text-gray-500 hover:bg-gray-100 rounded-full transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="refresh">refresh</span>
</button>
<button class="p-2 text-gray-500 hover:bg-gray-100 rounded-full transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
<div class="w-8 h-8 rounded-full overflow-hidden border border-outline-variant">
<img alt="Srikar's Profile" class="w-full h-full object-cover" data-alt="close up professional headshot of a person with friendly expression in minimalist studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBVGBptylI9Zp4KcOzPjmR0PqYOn0BKTyPHz0hQhWq86tMwBpCZ_FQjqp_oMQe1kAnFVzMZ59iA1qlMuI87V7ubDtkrC8n60vdgesHenlW3PRJeRaT0SThC8pgtAtpgLMe-kVmScxe5dhEh-TQEV7Ic1Pc6nBVYK2kTM0_OG2MC3jDrZcByO7b8wBtjM07nHtcI3NOl7zMhPwBci9F3LNPMVajjdv2L7U6K2KUKPaWLVSMfhr1C7Uv9c5xOsG5fab8gL_7N1_4-O5M"/>
</div>
</div>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex items-center justify-center pt-16 pb-12 px-4">
<!-- Single-column centered container -->
<div class="w-full max-w-[720px]">
<!-- Password Modal-like Container -->
<div class="relative w-full bg-surface-container-lowest border border-outline-variant/30 rounded-xl shadow-[0_10px_30px_rgba(0,0,0,0.04)] overflow-hidden">
<!-- File Reference Header -->
<div class="px-8 pt-8 pb-6 bg-surface-container-low/50 flex flex-col items-center text-center">
<div class="w-12 h-12 bg-surface-container-highest rounded-lg flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="upload_file">upload_file</span>
</div>
<h2 class="text-[15px] font-semibold text-on-surface mb-1 font-headline">Unlock Portfolio</h2>
<p class="text-sm font-medium text-outline font-body tracking-tight">my_portfolio.pdf</p>
</div>
<!-- Form Content -->
<div class="px-8 pb-8 pt-4">
<div class="space-y-6">
<!-- Password Field Group -->
<div class="space-y-3">
<label class="block text-[12px] font-medium text-outline uppercase tracking-wider" for="password">File Password</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg py-3 px-4 text-on-surface focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all font-body" id="password" placeholder="Enter password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 p-1 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<p class="text-[13px] leading-relaxed text-outline font-body">
                            Usually your PAN (in caps) followed by date of birth in DDMMYYYY format. <br/>
<span class="text-on-surface/60 mt-1 block">Example: ABCDE1234F01011990</span>
</p>
</div>
<!-- Action Button -->
<button class="w-full bg-primary text-white py-4 rounded-lg font-semibold text-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Unlock &amp; Import</span>
<span class="material-symbols-outlined text-lg" data-icon="lock_open">lock_open</span>
</button>
<!-- Back Navigation -->
<div class="flex justify-center pt-2">
<button class="text-sm font-medium text-outline hover:text-primary transition-colors flex items-center gap-2 group">
<span class="material-symbols-outlined text-base group-hover:-translate-x-1 transition-transform" data-icon="arrow_back">arrow_back</span>
<span>Choose a different file</span>
</button>
</div>
</div>
</div>
<!-- Bottom Tonal Accent -->
<div class="h-1 bg-gradient-to-r from-transparent via-outline-variant/20 to-transparent"></div>
</div>
</div>
</main>
</body></html>
