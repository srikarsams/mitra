<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Parsing Progress - Mitra</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-container": "#ffffff",
                    "on-primary-fixed": "#ffffff",
                    "on-secondary-fixed-variant": "#353c48",
                    "surface-container-highest": "#e1e3e4",
                    "on-primary-fixed-variant": "#dce2f7",
                    "on-primary": "#dce2f7",
                    "inverse-primary": "#c0c6db",
                    "surface-tint": "#575e70",
                    "primary-fixed-dim": "#404758",
                    "error-container": "#ffdad6",
                    "on-surface": "#191c1d",
                    "on-secondary-container": "#151c27",
                    "surface": "#f8f9fa",
                    "secondary": "#585f6c",
                    "on-background": "#191c1d",
                    "background": "#f8f9fa",
                    "on-primary-container": "#ffffff",
                    "surface-container-high": "#e7e8e9",
                    "on-tertiary-fixed": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "surface-container": "#edeeef",
                    "surface-dim": "#d9dadb",
                    "secondary-container": "#ced4e4",
                    "on-surface-variant": "#474747",
                    "tertiary-fixed-dim": "#005320",
                    "on-tertiary": "#7ffc97",
                    "secondary-fixed": "#c0c7d6",
                    "on-error": "#ffffff",
                    "inverse-surface": "#2e3132",
                    "surface-bright": "#f8f9fa",
                    "surface-variant": "#e1e3e4",
                    "secondary-fixed-dim": "#a4abbb",
                    "outline-variant": "#c6c6c6",
                    "tertiary-fixed": "#006e2d",
                    "outline": "#777777",
                    "inverse-on-surface": "#f0f1f2",
                    "on-error-container": "#410002",
                    "tertiary": "#00461a",
                    "surface-container-low": "#f3f4f5",
                    "on-secondary": "#ffffff",
                    "primary-container": "#343b4c",
                    "on-tertiary-fixed-variant": "#7ffc97",
                    "primary-fixed": "#575e70",
                    "primary": "#000000",
                    "on-secondary-fixed": "#151c27",
                    "error": "#ba1a1a",
                    "tertiary-container": "#00873a"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes progress-sweep {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }
        .animate-progress-sweep {
            animation: progress-sweep 2s infinite ease-in-out;
        }
        /* Custom layout rule: Navigation suppression for transactional/focused state */
    </style>
</head>
<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-6">
<!-- Focused Transactional Container -->
<main class="w-full max-w-md">
<!-- Brand Anchor (Simplified for focus state) -->
<div class="flex justify-center mb-12">
<div class="flex items-center gap-2">
<span class="text-2xl font-black tracking-tighter text-primary">Mitra</span>
<span class="h-1 w-1 rounded-full bg-primary mt-3"></span>
</div>
</div>
<!-- Progress Card -->
<div class="bg-white rounded-xl shadow-[0_10px_30px_rgba(0,0,0,0.04)] border border-outline-variant/60 p-10 flex flex-col items-center">
<!-- Contextual Icon -->
<div class="mb-8 w-12 h-12 rounded-full bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="terminal">terminal</span>
</div>
<!-- Terminal Headline -->
<h1 class="text-[20px] font-semibold text-primary mb-2 tracking-tight">Institutional Intake</h1>
<p class="text-[14px] text-on-surface-variant mb-12 text-center leading-relaxed">
                Processing encrypted data streams. <br/> 
                Establishing secure mapping to vault schemas.
            </p>
<!-- Custom Progress Component -->
<div class="w-full space-y-6">
<!-- Track -->
<div class="relative w-full h-[3px] bg-surface-container-highest overflow-hidden">
<!-- Sweep Bar -->
<div class="absolute inset-0 w-1/4 bg-primary animate-progress-sweep"></div>
</div>
<!-- Cycling Status Text -->
<div class="flex flex-col items-center gap-1">
<span class="text-[14px] font-medium text-primary">Decrypting PDF...</span>
<!-- These would cycle in a real app, showing them statically or layered for this UI snapshot -->
<span class="text-[12px] text-outline uppercase tracking-widest font-bold">System Status: Active</span>
</div>
</div>
<!-- Monastic Metadata -->
<div class="mt-12 w-full pt-8 border-t border-surface-variant flex justify-between items-center">
<div class="flex flex-col">
<span class="text-[11px] font-bold text-outline uppercase tracking-wider">Source</span>
<span class="text-[13px] font-medium text-primary">CAS_REPORT_2024.pdf</span>
</div>
<div class="flex flex-col text-right">
<span class="text-[11px] font-bold text-outline uppercase tracking-wider">Security</span>
<span class="text-[13px] font-medium text-primary">256-bit AES</span>
</div>
</div>
</div>
<!-- Footer Help -->
<div class="mt-8 flex justify-center gap-4">
<button class="text-[12px] font-medium text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1.5">
<span class="material-symbols-outlined text-[16px]" data-icon="help_outline">help_outline</span>
                Need assistance?
            </button>
</div>
</main>
<!-- Visual Background Element (Subtle Grain/Depth) -->
<div class="fixed inset-0 pointer-events-none z-[-1] opacity-40">
<div class="absolute inset-0 bg-[radial-gradient(#e1e3e4_1px,transparent_1px)] [background-size:24px_24px]"></div>
</div>
</body></html>
